name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./gsx-practica2/nginx-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:${{ github.sha }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./gsx-practica2/simple-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/simple-app-gsx:${{ github.sha }}

  validate-terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gsx-practica2/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate