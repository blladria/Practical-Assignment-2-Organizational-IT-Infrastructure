name: CI/CD Pipeline Advanced

on:
  push:
    branches:
      - main 

jobs:
  build-secure-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. MEJORA DE RENDIMIENTO: Activar Docker Buildx para usar la Caché
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==========================================
      # FRONTEND (NGINX)
      # ==========================================
      # 2. ESTRATEGIA DE RELEASE: Doble tag (SHA y stable) + Caché
      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./gsx-practica2/nginx-app 
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. SEGURIDAD: Escaneo con Trivy (Falla si hay vulnerabilidades Altas/Críticas)
      - name: Run Trivy vulnerability scanner on Nginx
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 4. ARTEFACTOS: Generar y subir el SBOM (Inventario de software)
      - name: Generate SBOM for Nginx
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:${{ github.sha }}
          artifact-name: sbom-nginx.json

      # ==========================================
      # BACKEND (NODE.JS)
      # ==========================================
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./gsx-practica2/simple-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-app-gsx:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-app-gsx:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/simple-app-gsx:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM for Backend
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/simple-app-gsx:${{ github.sha }}
          artifact-name: sbom-backend.json