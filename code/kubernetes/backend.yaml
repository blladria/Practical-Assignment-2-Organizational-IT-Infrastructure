---
apiVersion: v1
kind: Service
metadata:
  name: backend # Este nombre exacto permite resolver http://backend:3000
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet # Requisito Avanzado: StatefulSet en lugar de Deployment
metadata:
  name: backend
spec:
  serviceName: "backend"
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: blladria/simple-app-gsx:v1 # Docker Hub
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: backend-config
        volumeMounts:
        - name: backend-data
          mountPath: /data
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
  # Requisito Avanzado: PersistentVolumeClaim dinámico
  volumeClaimTemplates:
  - metadata:
      name: backend-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi